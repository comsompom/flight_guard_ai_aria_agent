version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: flightguard-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./artifacts:/app/artifacts

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: flightguard-mcp
    env_file:
      - .env
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: flightguard-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
